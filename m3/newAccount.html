<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Create Account</title>
        <link rel="stylesheet" href="Create.css">
    </head>
    <body>
        <div class="box">
            <form>
                <div class="flex">
                   <div> <label for="fastName">Your First Name</label>
                    <br>
                    <input type="text" name id="fastname"></div>
                    <br>
                    <div>
                        <label for="lastName">Your Last Name</label>
                    <br>
                    <input type="text" name id="lastName">
                    </div>
                    <br>
                </div>
                <div class="flex">
                   <div>
                     <label for="email">Your Email</label>
                    <br>
                    <input type="email" name id="email">
                   </div>
                   <div>
                      <label for="number">Your phone Number</label>
                    <br>
                    <input type="number" name id="number">
                   </div>
                </div>
                <div class="flex">
                    <div><label for="password">Your password</label>
                    <br>
                    <input type="password" name id="password">
                    </div>
                   <div>
                     <label for="confrem">Your Confirmed Password</label>
                    <br>
                    <input type="password" name id="confrem">
                   </div>
                </div>
                <div class="last">
                    <label for="addres">Your address</label>
                    <br>
                    <input
                        cols="3"
                        rows="4"
                        type="text"
                        name
                        id="addres">
                    <br>
                    <label for="comment">Your Comments</label>
                    <br>
                    <input type="text" name id="comment">
                </div>
                <div class="btn">
                    <div class="flex2">
                        <input type="checkbox" name id="trams">
                    <label for="trams">Trams and Condition</label>
                    </div>
                    <br>
                   <div class="flex1">
                     <input id="clear" type="reset" value="Clear">
                    <br>
                    <a href="login-page.html">Submit</a>
                   </div>
                </div>
            </form>
        </div>
    </body>
